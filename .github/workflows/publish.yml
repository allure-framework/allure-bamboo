name: Publish Release

permissions:
  contents: write
  packages: write
  attestations: write

on:
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5.4.0
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - run: echo "VERSION=${GITHUB_REF:10}" >> $GITHUB_ENV
      - run: ./mvnw clean package -q
      - uses: softprops/action-gh-release@v3
        with:
          files: ./target/allure-bamboo-${{ env.VERSION }}.jar
      - name: Publish to Atlassian Marketplace
        if: ${{ !github.event.release.prerelease }}
        env:
          MARKETPLACE_EMAIL: ${{ secrets.MARKETPLACE_EMAIL }}
          MARKETPLACE_TOKEN: ${{ secrets.MARKETPLACE_TOKEN }}
          ARTIFACT: ./target/allure-bamboo-${{ env.VERSION }}.jar
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: ./scripts/publish-marketplace.sh
