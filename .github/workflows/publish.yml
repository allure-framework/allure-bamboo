name: Publish Release

permissions:
  contents: write
  packages: write
  attestations: write

on:
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - run: echo "VERSION=${GITHUB_REF:10}" >> $GITHUB_ENV
      - run: ./mvnw clean package -q
      - uses: softprops/action-gh-release@v3
        with:
          files: ./target/allure-bamboo-${{ env.VERSION }}.jar
