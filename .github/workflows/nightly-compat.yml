name: Compatibility Smoke

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      bamboo_version:
        description: Bamboo version to test
        required: true
        default: '10.2.5'
        type: string

jobs:
  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build plugin artifact
        run: ./mvnw -q clean package
      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jar
          path: target/allure-bamboo-*.jar
          if-no-files-found: error

  compat:
    runs-on: ubuntu-latest
    needs: build-plugin
    env:
      BAMBOO_VERSION: ${{ inputs.bamboo_version }}
      BAMBOO_PRODUCT_LICENSE: ${{ vars.BAMBOO_COMPAT_PRODUCT_LICENSE }}
      BAMBOO_APP_LICENSE: ${{ vars.BAMBOO_COMPAT_APP_LICENSE }}
      BAMBOO_ARTIFACT_ROOT: ${{ github.workspace }}/compat-artifacts/${{ inputs.bamboo_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Download plugin jar
        uses: actions/download-artifact@v4
        with:
          name: plugin-jar
          path: target
      - name: Run Bamboo compatibility smoke
        run: |
          ./mvnw -q -f compat/bamboo-specs/pom.xml \
            -Dcompat.rootDir="${{ github.workspace }}" \
            -Dcompat.version="$BAMBOO_VERSION" \
            -Dcompat.productLicense="$BAMBOO_PRODUCT_LICENSE" \
            -Dcompat.artifactRoot="$BAMBOO_ARTIFACT_ROOT" \
            ${BAMBOO_APP_LICENSE:+-Dcompat.appLicense="$BAMBOO_APP_LICENSE"} \
            exec:java
      - name: Upload compatibility artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compat-${{ inputs.bamboo_version }}
          path: compat-artifacts/${{ inputs.bamboo_version }}
          if-no-files-found: warn
      - name: Append workflow summary
        if: always()
        run: |
          echo "## Bamboo ${{ inputs.bamboo_version }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f "compat-artifacts/${{ inputs.bamboo_version }}/summary.md" ]]; then
            cat "compat-artifacts/${{ inputs.bamboo_version }}/summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Smoke run did not complete successfully." >> "$GITHUB_STEP_SUMMARY"
          fi
